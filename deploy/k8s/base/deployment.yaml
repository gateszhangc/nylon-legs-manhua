apiVersion: apps/v1
kind: Deployment
metadata:
  name: nylon-legs-manhua
  labels:
    app.kubernetes.io/name: nylon-legs-manhua
    app.kubernetes.io/part-of: nylon-legs-manhua
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nylon-legs-manhua
      app.kubernetes.io/part-of: nylon-legs-manhua
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nylon-legs-manhua
        app.kubernetes.io/part-of: nylon-legs-manhua
    spec:
      containers:
        - name: web
          image: registry.144.91.77.245.sslip.io/nylon-legs-manhua:bootstrap
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nylon-legs-manhua-web-env
            - secretRef:
                name: nylon-legs-manhua-web-secrets
                optional: true
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /robots.txt
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /robots.txt
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /robots.txt
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
