name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nylon-legs-manhua-release
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: registry.144.91.77.245.sslip.io
  IMAGE_REPOSITORY: registry.144.91.77.245.sslip.io/nylon-legs-manhua
  KUSTOMIZATION_PATH: deploy/k8s/overlays/prod/kustomization.yaml
  NEXT_PUBLIC_WEB_URL: https://nylon-legs-manhua.lol
  NEXT_PUBLIC_PROJECT_NAME: nylon-legs-manhua
  NEXT_PUBLIC_CLARITY_PROJECT_ID: wazw1tamcn
  NEXT_PUBLIC_AUTH_DISABLED: "true"

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            NEXT_PUBLIC_WEB_URL=${{ env.NEXT_PUBLIC_WEB_URL }}
            NEXT_PUBLIC_PROJECT_NAME=${{ env.NEXT_PUBLIC_PROJECT_NAME }}
            NEXT_PUBLIC_GOOGLE_ANALYTICS_ID=${{ vars.NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}
            NEXT_PUBLIC_CLARITY_PROJECT_ID=${{ env.NEXT_PUBLIC_CLARITY_PROJECT_ID }}
            NEXT_PUBLIC_AUTH_DISABLED=${{ env.NEXT_PUBLIC_AUTH_DISABLED }}

  update-gitops-tag:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          KUSTOMIZATION_PATH: ${{ env.KUSTOMIZATION_PATH }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          import re

          path = Path(os.environ["KUSTOMIZATION_PATH"])
          content = path.read_text()
          updated, count = re.subn(
              r"(^\s*newTag:\s*).*$",
              lambda match: f"{match.group(1)}{os.environ['IMAGE_TAG']}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise SystemExit("expected exactly one newTag entry in the kustomization file")
          path.write_text(updated)
          PY

      - name: Commit manifest update
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          KUSTOMIZATION_PATH: ${{ env.KUSTOMIZATION_PATH }}
        run: |
          if git diff --quiet -- "$KUSTOMIZATION_PATH"; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KUSTOMIZATION_PATH"
          git commit -m "chore: release ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
